<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>書庫書名驗證（金石堂）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang TC",sans-serif;background:#F7F5F2;color:#3D3229;padding:14px;font-size:14px;line-height:1.6}
h1{font-size:17px;margin-bottom:4px}
.sub{font-size:11px;color:#9B8B7A;margin-bottom:14px;line-height:1.7}
.panel{background:#fff;border:1px solid #E8E0D8;border-radius:12px;padding:13px;margin-bottom:11px}
.btn{width:100%;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:7px}
.go{background:#E0895A;color:#fff}
.go:disabled{background:#DDD3C8;cursor:default}
.sec{background:#fff;border:1.5px solid #E0895A;color:#E0895A}
.pbar{height:7px;background:#EEE7E0;border-radius:4px;overflow:hidden;margin:9px 0 5px}
.pfill{height:100%;background:#E0895A;width:0;transition:width .2s}
.stat{font-size:11px;color:#9B8B7A;display:flex;justify-content:space-between}
.counts{display:flex;gap:7px;margin-top:10px}
.cbox{flex:1;text-align:center;border-radius:9px;padding:8px 4px}
.cbox b{display:block;font-size:19px;font-weight:800}
.cbox span{font-size:9px}
.c-ok{background:#EAF7EC;color:#3E8A50}
.c-warn{background:#FFF3E0;color:#B87333}
.c-none{background:#F0EDEA;color:#8A7A6A}
.item{border-top:1px solid #F0EBE5;padding:10px 0;font-size:12px}
.item:first-child{border-top:none}
.mine{font-weight:800;color:#3D3229}
.mine em{font-style:normal;font-weight:500;color:#9B8B7A;font-size:10.5px}
.goog{color:#B87333;margin-top:3px;padding-left:11px;border-left:2px solid #F0C79A}
.goog div{margin-bottom:2px;font-size:11px}
.tag{display:inline-block;font-size:8.5px;font-weight:800;border-radius:4px;padding:1px 4px;margin-left:4px}
.t-tw{background:#EAF7EC;color:#3E8A50}
.t-non{background:#FDECEC;color:#C0564C}
.out{width:100%;height:170px;border:1px solid #E8E0D8;border-radius:9px;padding:9px;font-family:ui-monospace,Menlo,monospace;font-size:10px;resize:vertical;margin-top:8px}
.hint{font-size:10px;color:#9B8B7A;margin-top:6px;line-height:1.7}
.warnbox{background:#FFF8E8;border:1px solid #F0DCA8;border-radius:9px;padding:9px 11px;font-size:10.5px;color:#8A6D3B;line-height:1.75;margin-bottom:11px}
</style></head><body>

<h1>📚 書庫書名驗證・金石堂</h1>
<div class="sub">用金石堂比對書庫的書名，找出可能寫錯的。</div>

<div class="warnbox">
⚠️ <b>只能給線索，不能當判決</b><br>
金石堂是台灣書店，中文童書收錄完整，準確度比 Google 圖書高很多。但絕版書可能查不到，標為「要確認」的仍需人工判斷。
</div>

<div class="panel">
  <button class="btn go" id="go" onclick="run()">開始驗證</button>
  <button class="btn sec" id="stop" onclick="stopIt()" style="display:none">停止</button>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div class="stat"><span id="prog">載入中…</span><span id="eta"></span></div>
  <div class="counts">
    <div class="cbox c-ok"><b id="n-ok">0</b><span>書名相符</span></div>
    <div class="cbox c-warn"><b id="n-warn">0</b><span>要確認</span></div>
    <div class="cbox c-none"><b id="n-none">0</b><span>查不到</span></div>
  </div>
  <div class="hint">中途關掉沒關係，進度會存著，下次按「開始驗證」接著跑。</div>
</div>

<div class="panel" id="rp" style="display:none">
  <b style="font-size:13px">⚠️ 要確認的書</b>
  <div class="hint">左邊是書庫寫的，右邊是金石堂查到的。</div>
  <div id="list"></div>
</div>

<div class="panel" id="cp" style="display:none">
  <b style="font-size:13px">📋 把結果複製給 Claude</b>
  <textarea class="out" id="out" readonly></textarea>
  <button class="btn go" onclick="cp()" style="margin-top:7px">複製結果</button>
</div>

<script>
const API = "https://books-senbei.vercel.app/api/scrape";
let BOOKS = [];
let running = false, R = {};
try { const s = localStorage.getItem("verify_ks"); if (s) R = JSON.parse(s); } catch(e) {}

// 空白字元直接列舉（半形空格、全形空格、tab、換行），標點類別把 - 放最後
// 這樣整個正則不需要任何跳脫字元，避免產生檔案時被多加一層反斜線
const SPACES = /[ 　\t\n\r]/g;
const PUNCT = /[！!？?。，,、：:；;（）()「」『』【】《》〈〉·・～~＿_–—-]/g;
function norm(s) {
  return String(s == null ? "" : s).replace(SPACES, "").replace(PUNCT, "").toLowerCase();
}

// Google 圖書收錄大量期刊、報紙、書目、年鑑，這些內容裡提到書名就會被撈出來，
// 全是雜訊，先擋掉，否則「蔬菜」會對到「全國總書目」這種完全不相關的東西
const NOISE = /月刊|週刊|周刊|日報|时报|時報|年鑑|年鉴|總書目|总书目|書目|书目|出版年|文匯|文汇|新書資訊|中央日報|盛京|公報|学报|學報|期刊|雜誌|杂志|論文|论文|研究報告|索引|目錄|目录|大全|全集|文集|選集|选集/;

function overlapRate(a, b) {
  const na = norm(a), nb = norm(b);
  if (!na.length) return 0;
  let hit = 0;
  for (const ch of na) if (nb.includes(ch)) hit++;
  return hit / na.length;
}

function classify(mine, items) {
  if (!items || !items.length) return { k: "none" };
  const nm = norm(mine);

  // 先濾掉期刊報紙這類雜訊，以及跟書名幾乎無關的（字元重疊低於一半）
  const cands = items.filter(it => {
    const t = it.title || "";
    if (!t) return false;
    if (it.ebook) return false;              // 電子書版本不算，只看紙本
    if (NOISE.test(t)) return false;
    return overlapRate(mine, t) >= 0.45;     // 金石堂資料乾淨，門檻可略放寬
  });
  if (!cands.length) return { k: "none" };

  // 完全相符（含把副標接上去比對）
  for (const it of cands) {
    if (norm(it.title) === nm) return { k: "ok", hit: it };
    if (norm(it.title + (it.subtitle || "")) === nm) return { k: "ok", hit: it };
  }
  // 互相包含也算相符：書庫寫簡稱、Google 是全名（或反過來）
  for (const it of cands) {
    const g = norm(it.title);
    if (g && nm && (g.includes(nm) || nm.includes(g))) return { k: "ok", hit: it };
  }
  return { k: "warn", cands: cands.slice(0, 3) };
}

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function paint() {
  const done = Object.keys(R).length;
  const pct = BOOKS.length ? Math.round(done / BOOKS.length * 100) : 0;
  document.getElementById("pf").style.width = pct + "%";
  document.getElementById("prog").textContent = done + " / " + BOOKS.length + "　(" + pct + "%)";
  const vals = Object.values(R);
  document.getElementById("n-ok").textContent = vals.filter(x => x.k === "ok").length;
  document.getElementById("n-warn").textContent = vals.filter(x => x.k === "warn").length;
  document.getElementById("n-none").textContent = vals.filter(x => x.k === "none").length;

  const warns = BOOKS.filter(b => R[b.t] && R[b.t].k === "warn");
  if (warns.length) {
    document.getElementById("rp").style.display = "block";
    document.getElementById("list").innerHTML = warns.map(b => {
      const r = R[b.t];
      return '<div class="item"><div class="mine">' + esc(b.t) + ' <em>／' + esc(b.a) + '・' + esc(b.p) + '・' + esc(b.g) + '</em></div>'
        + '<div class="goog">' + (r.cands || []).map(c =>
          '<div>' + esc(c.title)
          + (c.author ? ' <em style="color:#9B8B7A">／' + esc(c.author) + '</em>' : '')
          + (c.publisher ? '・' + esc(c.publisher) : '')
          + '</div>'
        ).join('') + '</div></div>';
    }).join('');
  }
  if (done > 0) {
    document.getElementById("cp").style.display = "block";
    document.getElementById("out").value = report();
  }
}

function report() {
  const NL = String.fromCharCode(10);
  const vals = Object.values(R);
  let o = "=== 書庫驗證結果 ===" + NL;
  o += "已驗證 " + vals.length + "/" + BOOKS.length + "　相符 " + vals.filter(x => x.k === "ok").length
     + "　要確認 " + vals.filter(x => x.k === "warn").length + "　查不到 " + vals.filter(x => x.k === "none").length + NL + NL;
  o += "--- 要確認 ---" + NL;
  BOOKS.filter(b => R[b.t] && R[b.t].k === "warn").forEach(b => {
    o += "【" + b.t + "】" + b.a + "・" + b.p + "・" + b.g + NL;
    (R[b.t].cands || []).forEach(c => {
      o += "   → " + c.title + " ／" + (c.author || "?") + "・" + (c.publisher || "?") + NL;
    });
  });
  o += NL + "--- 查不到（金石堂沒有，可能絕版或書名錯） ---" + NL;
  o += BOOKS.filter(b => R[b.t] && R[b.t].k === "none").map(b => b.t + "（" + b.a + "）").join(NL);
  return o;
}

async function run() {
  if (!BOOKS.length) { alert("書單還沒載入完，稍等一下再按"); return; }
  running = true;
  document.getElementById("go").style.display = "none";
  document.getElementById("stop").style.display = "block";
  const t0 = Date.now();
  let n = 0;
  for (const b of BOOKS) {
    if (!running) break;
    if (R[b.t]) continue;
    // 書名＋作者一起查，比單查書名精準（同名書很多）
    const useAuthor = b.a && b.a !== "—" && !/多位|編輯部/.test(b.a);
    const q = b.t + (useAuthor ? " " + b.a : "");
    try {
      const r = await fetch(API + "?ks=" + encodeURIComponent(q));
      const d = await r.json();
      R[b.t] = classify(b.t, d.items || []);
    } catch (e) {
      R[b.t] = { k: "none" };
    }
    try { localStorage.setItem("verify_ks", JSON.stringify(R)); } catch(e) {}
    n++;
    const el = (Date.now() - t0) / 1000;
    const left = Math.round((BOOKS.length - Object.keys(R).length) * (el / n));
    document.getElementById("eta").textContent = "約剩 " + Math.floor(left / 60) + " 分 " + (left % 60) + " 秒";
    paint();
    await new Promise(x => setTimeout(x, 120));
  }
  running = false;
  document.getElementById("go").style.display = "block";
  document.getElementById("stop").style.display = "none";
  if (Object.keys(R).length >= BOOKS.length) {
    document.getElementById("go").textContent = "重新驗證（清除進度）";
    document.getElementById("go").onclick = () => {
      R = {};
      try { localStorage.removeItem("verify_ks"); } catch(e) {}
      location.reload();
    };
    document.getElementById("eta").textContent = "✓ 完成";
  } else {
    document.getElementById("go").textContent = "繼續驗證";
  }
}

function stopIt() { running = false; }

function cp() {
  const t = document.getElementById("out");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t.value).then(() => alert("已複製"));
  } else {
    t.select();
    document.execCommand("copy");
    alert("已複製");
  }
}

fetch("booklist.json")
  .then(r => r.json())
  .then(d => { BOOKS = d; paint(); })
  .catch(e => { document.getElementById("prog").textContent = "❌ 讀不到 booklist.json"; });
</script></body></html>
