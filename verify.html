<h1>📚 書庫書名驗證・金石堂</h1>
<div class="sub">只重查上次「要確認」與「查不到」的 121 本（已確認相符的 170 幾本不再重跑）。</div>

<div class="warnbox">
⚠️ <b>只能給線索，不能當判決</b><br>
金石堂是台灣書店，中文童書收錄完整，準確度比 Google 圖書高很多。但絕版書可能查不到，標為「要確認」的仍需人工判斷。
</div>

<div class="panel">
  <button class="btn go" id="go" onclick="run()">開始重查（121 本）</button>
  <button class="btn sec" id="stop" onclick="stopIt()" style="display:none">停止</button>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div class="stat"><span id="prog">載入中…</span><span id="eta"></span></div>
  <div class="counts">
    <div class="cbox c-ok"><b id="n-ok">0</b><span>書名相符</span></div>
    <div class="cbox c-warn"><b id="n-warn">0</b><span>要確認</span></div>
    <div class="cbox c-none"><b id="n-none">0</b><span>查不到</span></div>
  </div>
  <div class="hint">這份只含有問題的書。查詢方式已修正：不帶作者名（書庫作者名格式跟書店不一致）、系列書查主名。</div>
</div>

<div class="panel" id="rp" style="display:none">
  <b style="font-size:13px">⚠️ 要確認的書</b>
  <div class="hint">左邊是書庫寫的，右邊是金石堂查到的。</div>
  <div id="list"></div>
</div>

<div class="panel" id="cp" style="display:none">
  <b style="font-size:13px">📋 把結果複製給 Claude</b>
  <textarea class="out" id="out" readonly></textarea>
  <button class="btn go" onclick="cp()" style="margin-top:7px">複製結果</button>
</div>

<script>
const API = "https://books-senbei.vercel.app/api/scrape";
let BOOKS = [];
let running = false, R = {};
try { const s = localStorage.getItem("verify_todo"); if (s) R = JSON.parse(s); } catch(e) {}

// 這幾本已經人工查過出版社官網／書店，結論明確，不用再送去查
const PREVERIFIED = {
  "哇，不見了！": "維京・ISBN 9789862035702（原書庫誤寫為「不見不見，哇！／信誼」）",
  "洗澡啦！": "臺灣麥克・岩崎知弘繪（原書庫誤寫為「洗澡澡／信誼」）",
  "小金魚逃走了": "信誼・ISBN 9789861615516（原書庫誤寫為「金魚跑掉了」）"
};
Object.keys(PREVERIFIED).forEach(t => { if (!R[t]) R[t] = { k: "ok", manual: PREVERIFIED[t] }; });

// 空白字元直接列舉（半形空格、全形空格、tab、換行），標點類別把 - 放最後
// 這樣整個正則不需要任何跳脫字元，避免產生檔案時被多加一層反斜線
const SPACES = /[ 　\t\n\r]/g;
const PUNCT = /[！!？?。，,、：:；;（）()「」『』【】《》〈〉·・～~＿_–—-]/g;

// 系列書要查主名：書店裡沒有一本書叫「屁屁偵探讀本系列」，
// 實際書名是「屁屁偵探讀本1：屁屁偵探登場」，查系列名一定查無此書
function seriesKey(t) {
  let s = String(t || "");
  s = s.replace(/（[^）]*）/g, "").replace(/\([^)]*\)/g, "");   // 去掉括號註記，如（1-3）（完整系列）
  s = s.replace(/（?共?\d+冊）?/g, "");
  s = s.replace(/讀本系列|完整系列|系列|套書|套組|（月刊）|月刊/g, "");
  s = s.replace(/[－\-]{1,2}$/, "");
  return s.trim() || String(t || "");
}

function norm(s) {
  return String(s == null ? "" : s).replace(SPACES, "").replace(PUNCT, "").toLowerCase();
}

// Google 圖書收錄大量期刊、報紙、書目、年鑑，這些內容裡提到書名就會被撈出來，
// 全是雜訊，先擋掉，否則「蔬菜」會對到「全國總書目」這種完全不相關的東西
const NOISE = /月刊|週刊|周刊|日報|时报|時報|年鑑|年鉴|總書目|总书目|書目|书目|出版年|文匯|文汇|新書資訊|中央日報|盛京|公報|学报|學報|期刊|雜誌|杂志|論文|论文|研究報告|索引|目錄|目录|大全|全集|文集|選集|选集/;

function overlapRate(a, b) {
  const na = norm(a), nb = norm(b);
  if (!na.length) return 0;
  let hit = 0;
  for (const ch of na) if (nb.includes(ch)) hit++;
  return hit / na.length;
}

function classify(mine, items) {
  if (!items || !items.length) return { k: "none" };
  const nm = norm(mine);

  // 先濾掉期刊報紙這類雜訊，以及跟書名幾乎無關的（字元重疊低於一半）
  const cands = items.filter(it => {
    const t = it.title || "";
    if (!t) return false;
    if (it.ebook) return false;              // 電子書版本不算，只看紙本
    if (NOISE.test(t)) return false;
    return overlapRate(mine, t) >= 0.45;     // 金石堂資料乾淨，門檻可略放寬
  });
  if (!cands.length) return { k: "none" };

  // 完全相符（含把副標接上去比對）
  for (const it of cands) {
    if (norm(it.title) === nm) return { k: "ok", hit: it };
    if (norm(it.title + (it.subtitle || "")) === nm) return { k: "ok", hit: it };
  }
  // 互相包含也算相符：書庫寫簡稱、書店是全名（或反過來）
  for (const it of cands) {
    const g = norm(it.title);
    if (g && nm && (g.includes(nm) || nm.includes(g))) return { k: "ok", hit: it };
  }
  // 系列書：書庫寫「神奇樹屋系列」，書店是「神奇樹屋1：恐龍谷大冒險」→ 只要主名對上就算相符
  const sk = norm(seriesKey(mine));
  if (sk && sk.length >= 2) {
    for (const it of cands) {
      if (norm(it.title).includes(sk)) return { k: "ok", hit: it, series: true };
    }
  }
  return { k: "warn", cands: cands.slice(0, 3) };
}

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function paint() {
  const done = Object.keys(R).length;
  const pct = BOOKS.length ? Math.round(done / BOOKS.length * 100) : 0;
  document.getElementById("pf").style.width = pct + "%";
  document.getElementById("prog").textContent = done + " / " + BOOKS.length + "　(" + pct + "%)";
  const vals = Object.values(R);
  document.getElementById("n-ok").textContent = vals.filter(x => x.k === "ok").length;
  document.getElementById("n-warn").textContent = vals.filter(x => x.k === "warn").length;
  document.getElementById("n-none").textContent = vals.filter(x => x.k === "none").length;

  const warns = BOOKS.filter(b => R[b.t] && R[b.t].k === "warn");
  if (warns.length) {
    document.getElementById("rp").style.display = "block";
    document.getElementById("list").innerHTML = warns.map(b => {
      const r = R[b.t];
      return '<div class="item"><div class="mine">' + esc(b.t) + ' <em>／' + esc(b.a) + '・' + esc(b.p) + '・' + esc(b.g) + '</em></div>'
        + '<div class="goog">' + (r.cands || []).map(c =>
          '<div>' + esc(c.title)
          + (c.author ? ' <em style="color:#9B8B7A">／' + esc(c.author) + '</em>' : '')
          + (c.publisher ? '・' + esc(c.publisher) : '')
          + '</div>'
        ).join('') + '</div></div>';
    }).join('');
  }
  if (done > 0) {
    document.getElementById("cp").style.display = "block";
    document.getElementById("out").value = report();
  }
}

function report() {
  const NL = String.fromCharCode(10);
  const vals = Object.values(R);
  let o = "=== 書庫驗證結果 ===" + NL;
  o += "已驗證 " + vals.length + "/" + BOOKS.length + "　相符 " + vals.filter(x => x.k === "ok").length
     + "　要確認 " + vals.filter(x => x.k === "warn").length + "　查不到 " + vals.filter(x => x.k === "none").length + NL + NL;
  o += "--- 要確認 ---" + NL;
  BOOKS.filter(b => R[b.t] && R[b.t].k === "warn").forEach(b => {
    o += "【" + b.t + "】" + b.a + "・" + b.p + "・" + b.g + NL;
    (R[b.t].cands || []).forEach(c => {
      o += "   → " + c.title + " ／" + (c.author || "?") + "・" + (c.publisher || "?") + NL;
    });
  });
  o += NL + "--- 查不到（金石堂沒有，可能絕版或書名錯） ---" + NL;
  o += BOOKS.filter(b => R[b.t] && R[b.t].k === "none").map(b => b.t + "（" + b.a + "）").join(NL);
  return o;
}

async function run() {
  if (!BOOKS.length) { alert("書單還沒載入完，稍等一下再按"); return; }
  running = true;
  document.getElementById("go").style.display = "none";
  document.getElementById("stop").style.display = "block";
  const t0 = Date.now();
  let n = 0;
  const todo = BOOKS.filter(b => !R[b.t] || R[b.t].k !== "ok").length;
  document.getElementById("eta").textContent = "這輪要查 " + todo + " 本";
  for (const b of BOOKS) {
    if (!running) break;
    // 已經確認「相符」的不用再查，只重跑「查不到」與「要確認」
    // （查詢方式改了，這些有機會翻案；相符的不會因此改變）
    if (R[b.t] && R[b.t].k === "ok") continue;
    // 只用書名查，不要加作者。
    // 原因：書庫的作者名格式跟書店不一致（書庫寫「李歐李奧尼」，金石堂寫「李歐．李奧尼」），
    // 一旦把作者串進查詢，連《晚安月亮》這種必定存在的經典都會查不到。
    // 驗證的目的是比對書名，同名書由後面的比對邏輯處理即可。
    const q = seriesKey(b.t);
    try {
      const r = await fetch(API + "?ks=" + encodeURIComponent(q));
      const d = await r.json();
      R[b.t] = classify(b.t, d.items || []);
    } catch (e) {
      R[b.t] = { k: "none" };
    }
    try { localStorage.setItem("verify_todo", JSON.stringify(R)); } catch(e) {}
    n++;
    const el = (Date.now() - t0) / 1000;
    const left = Math.round((todo - n) * (el / n));
    document.getElementById("eta").textContent = "約剩 " + Math.floor(left / 60) + " 分 " + (left % 60) + " 秒";
    paint();
    await new Promise(x => setTimeout(x, 120));
  }
  running = false;
  document.getElementById("go").style.display = "block";
  document.getElementById("stop").style.display = "none";
  const stillBad = BOOKS.filter(b => !R[b.t]).length;
  if (stillBad === 0) {
    document.getElementById("go").textContent = "重新驗證（清除進度）";
    document.getElementById("go").onclick = () => {
      R = {};
      try { localStorage.removeItem("verify_todo"); } catch(e) {}
      location.reload();
    };
    document.getElementById("eta").textContent = "✓ 完成";
  } else {
    document.getElementById("go").textContent = "繼續驗證";
  }
}

function stopIt() { running = false; }

function cp() {
  const t = document.getElementById("out");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t.value).then(() => alert("已複製"));
  } else {
    t.select();
    document.execCommand("copy");
    alert("已複製");
  }
